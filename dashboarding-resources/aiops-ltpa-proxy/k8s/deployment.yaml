apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-ltpa-proxy
  labels:
    app: aiops-ltpa-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-ltpa-proxy
  template:
    metadata:
      labels:
        app: aiops-ltpa-proxy
    spec:
      # Pod-level security context
      # Let OpenShift assign UID/GID from the project's allowed range
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: proxy
        # This image is built from the Containerfile in the parent directory
        # Build steps:
        #   1. podman build -t aiops-ltpa-proxy -f ../Containerfile ..
        #   2. podman tag aiops-ltpa-proxy your-registry/aiops-ltpa-proxy:latest
        #   3. podman push your-registry/aiops-ltpa-proxy:latest
        # Then update this line with your registry URL:
        image: icr.io/ibm-aiops-dev/developer-aiops/aiops-ltpa-proxy:20260429-0930
        imagePullPolicy: Always

        ports:
        - containerPort: 8443
          name: proxy
          protocol: TCP
        - containerPort: 8444
          name: health
          protocol: TCP

        # Startup probe - gives container time to start before liveness checks begin
        startupProbe:
          httpGet:
            path: /health
            port: 8444
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12  # 12 * 5s = 60s max startup time

        # Liveness probe - checks if container is alive
        livenessProbe:
          httpGet:
            path: /health
            port: 8444
            scheme: HTTPS
          initialDelaySeconds: 0  # Startup probe handles initial delay
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe - checks if container is ready to serve traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 8444
            scheme: HTTPS
          initialDelaySeconds: 0  # Startup probe handles initial delay
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        # Security context - follows security best practices
        # Let OpenShift assign the UID from the project's allowed range
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: false  # Node.js needs to write temp files
          runAsNonRoot: true

        # Resource limits and requests
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Volume mounts - where secrets and configs appear in the container
        volumeMounts:
        # Config file - mount at the location where the app reads it
        - name: config
          mountPath: /opt/app-root/src/etc/config
          readOnly: true

        # LTPA keys and password
        - name: ltpa-keys
          mountPath: /etc/secrets/ltpa
          readOnly: true

        # Proxy TLS certificate (auto-generated by OpenShift)
        - name: proxy-cert
          mountPath: /etc/secrets/proxy-cert
          readOnly: true

        # Trusted certificates for downstream connections
        - name: trusted-certs
          mountPath: /etc/trusted-certs
          readOnly: true

      # Volumes - references to secrets and configmaps
      volumes:
      # Configuration file
      - name: config
        configMap:
          name: node-auth-proxy-config

      # LTPA keys secret
      - name: ltpa-keys
        secret:
          secretName: ltpa-keys
          items:
          - key: ltpa.key
            path: ltpa.key
          - key: ltpa.password
            path: ltpa.password

      # Proxy TLS certificate (auto-created by OpenShift service annotation)
      - name: proxy-cert
        secret:
          secretName: proxy-tls-cert
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key

      # Trusted certificates - includes CA for validating AIOps JWKS endpoint
      - name: trusted-certs
        projected:
          defaultMode: 292
          sources:
          # CA used by zen (including nginx front-door for JWT/JWKS)
          - secret:
              items:
              - key: cert.crt
                path: zen-ca.crt
              name: ibm-nginx-internal-tls-ca
              optional: true
          # Optional: Additional trusted certificates from configmap
          - configMap:
              name: trusted-certs
              optional: true

