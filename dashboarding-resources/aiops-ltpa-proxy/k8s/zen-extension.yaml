apiVersion: zen.cpd.ibm.com/v1
kind: ZenExtension
metadata:
  finalizers:
    - zenextension.zen.cpd.ibm.com/finalizer
  name: aiops-impact-reverse-proxy-ext
  namespace: aiops
spec:
  aiops-impact-reverse-proxy.nginx.conf: |-
    location ~^/aiops/opview/{
      access_by_lua_file /nginx_data/checkjwt.lua;
      access_log /dev/stdout aiops_custom_format;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Host $host;
      proxy_read_timeout 10m;
      rewrite    ^/aiops/opview/(.*) /api/opview/$1 break;
      # Route through aiops-ltpa-proxy instead of directly to Impact
      # The aiops-ltpa-proxy will handle LTPA authentication and proxy to Impact
      proxy_pass https://aiops-ltpa-proxy.aiops.svc.cluster.local:8443;
    }
  extensions: |-
    [
      {
        "details": {
          "location_conf": "aiops-impact-reverse-proxy.nginx.conf",
        },
        "extension_name": "aiops-impact-reverse-proxy",
        "extension_point_id": "zen_front_door"
      }
    ]

