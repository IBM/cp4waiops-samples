apiVersion: batch/v1
kind: Job
metadata:
  name: aiops-restore-job
  namespace: velero
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: restore-sa
      volumes:
        - name: restore-data-config
          configMap:
            name: restore-config
        - name: aiops-config
          configMap:
            name: restore-config
        - name: workdir
          emptyDir: {}
      containers:
      - image: "icr.io/cpopen/cp4waiops/cp4aiops-bcdr@sha256:9fb440d169117ece54e7acc8a9d2a20d10c444e49ea23016e3c519ce1be32d24"
        imagePullPolicy: Always
        name: aiops-restore
        command: ["/bin/bash", "/bcdr/restore/restore.sh","-aiops"]
        resources: {}
        env:
        - name: WORKDIR
          value: "/bcdr"
        volumeMounts:
          - name: restore-data-config
            mountPath: /bcdr/restore/restore-data.json
            subPath: restore-data.json 
          - name: aiops-config
            mountPath: /bcdr/common/aiops-config.json
            subPath: aiops-config.json
          - mountPath: /workdir
            name: workdir
      restartPolicy: Never
